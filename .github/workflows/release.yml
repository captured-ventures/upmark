name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

# Same os/runner split as ci.yml: keep `os` as the stable job-name label
# even when the runner provider changes. We invoke `wails build` directly
# rather than via dAppServer/wails-build-action because that action still
# pins actions/upload-artifact@v3, which GitHub force-fails since Jan 2025.
jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            runner: blacksmith-2vcpu-windows-2025
            platform: windows/amd64
            artifact_name: upmark-windows-amd64
          - os: macos-latest
            runner: blacksmith-6vcpu-macos-latest
            platform: darwin/universal
            artifact_name: upmark-macos-universal
          - os: ubuntu-latest
            runner: blacksmith-4vcpu-ubuntu-2404
            platform: linux/amd64
            artifact_name: upmark-linux-amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Resolve version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install Linux build deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      # Blacksmith's Windows runner doesn't preinstall NSIS, unlike GitHub-hosted.
      - name: Install NSIS
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: choco install nsis -y --no-progress

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      # Wails build does its own frontend npm install + vite build, but it
      # invokes Go compilation midway (for bindings/manifest), which hits the
      # //go:embed all:frontend/dist directive before dist exists. Stub it.
      - name: Stub frontend/dist
        shell: bash
        run: mkdir -p frontend/dist && touch frontend/dist/.keep

      - name: Wails build (Windows + NSIS)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: wails build -platform windows/amd64 -nsis -clean -ldflags "-X 'main.version=${{ steps.version.outputs.version }}'"

      - name: Wails build (macOS universal)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: wails build -platform darwin/universal -clean -ldflags "-X 'main.version=${{ steps.version.outputs.version }}'"

      # Ubuntu 24.04 dropped webkit2gtk-4.0; 4.1 is the only available libwebkit.
      # Wails v2.10+ supports the 4.1 API via the webkit2_41 build tag.
      - name: Wails build (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: wails build -platform linux/amd64 -clean -tags webkit2_41 -ldflags "-X 'main.version=${{ steps.version.outputs.version }}'"

      - name: Stage Windows artifacts
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          mkdir -p dist
          cp build/bin/upmark.exe "dist/upmark-${{ steps.version.outputs.version }}-windows-amd64.exe"
          if [ -f build/bin/upmark-amd64-installer.exe ]; then
            cp build/bin/upmark-amd64-installer.exe "dist/upmark-${{ steps.version.outputs.version }}-windows-amd64-installer.exe"
          fi

      - name: Stage macOS artifacts
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          mkdir -p dist
          cd build/bin
          if [ -d upmark.app ]; then
            zip -r "../../dist/upmark-${{ steps.version.outputs.version }}-macos-universal.zip" upmark.app
          fi

      - name: Stage Linux artifacts
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          mkdir -p dist
          cd build/bin
          tar -czf "../../dist/upmark-${{ steps.version.outputs.version }}-linux-amd64.tar.gz" upmark

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List staged files
        run: ls -lah dist/

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: false
