name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# `os` is the stable label that drives the job name (and the names required
# by main-branch rulesets). `runner` is the actual runs-on value, which can
# change without breaking rulesets. Keep `os` literal even when migrating
# between runner providers.
jobs:
  build:
    name: Build + lint (ubuntu-latest)
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Wails-scaffolded projects keep frontend/dist and frontend/wailsjs
      # under gitignore (they're generated). main.go has //go:embed all:frontend/dist
      # and App.svelte imports from ../wailsjs/go/main/App, so we need both to
      # exist before any go vet / build / svelte-check step.
      # main.go has //go:embed all:frontend/dist, which fails compile if the
      # directory doesn't exist. The dir gets populated by `npm run build`
      # below, but `wails generate module` compiles Go before that runs, so
      # we stub it with a placeholder first.
      - name: Stub frontend/dist for //go:embed
        run: mkdir -p frontend/dist && touch frontend/dist/.keep

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Generate Wails bindings (populates frontend/wailsjs)
        run: wails generate module

      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$out"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: svelte-check
        run: npm run check
        working-directory: frontend

      - name: vite build (populates frontend/dist for real)
        run: npm run build
        working-directory: frontend

      - name: go build
        run: go build ./...
