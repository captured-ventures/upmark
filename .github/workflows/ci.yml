name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# `os` is the stable label that drives the job name (and the names required
# by main-branch rulesets). `runner` is the actual runs-on value, which can
# change without breaking rulesets. Keep `os` literal even when migrating
# between runner providers.
jobs:
  go:
    name: Go lint + build
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$out"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

  frontend:
    name: Frontend check + build
    runs-on: blacksmith-2vcpu-ubuntu-2404
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        run: npm ci

      - name: svelte-check
        run: npm run check

      - name: vite build
        run: npm run build

  wails-smoke:
    name: Wails build smoke (linux)
    runs-on: blacksmith-2vcpu-ubuntu-2404
    needs: [go, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: dAppServer/wails-build-action@v2.2
        with:
          build-name: upmark
          build-platform: linux/amd64
          package: false
          go-version: '1.23'
          node-version: '20'
