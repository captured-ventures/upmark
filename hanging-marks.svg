<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 220" width="480" height="220">
  <defs>
    <style>
      .paper { fill: #faf8f3; }
      .ink   { fill: #1a1a1c; }
      .rule  { stroke: #1a1a1c; stroke-opacity: 0.10; }
      .mark  { fill: #a8451c; font-family: Georgia, serif; font-style: italic; }
      .body  { fill: #1a1a1c; font-family: Georgia, serif; }
    </style>
  </defs>
  <rect class="paper" x="0" y="0" width="480" height="220"/>
  <line class="rule" x1="120" y1="32" x2="448" y2="32"/>
  <text class="mark" x="78"  y="58" font-size="13" text-anchor="end">§ 1</text>
  <text class="body" x="120" y="58" font-size="22" font-weight="500">The hanging mark</text>
  <text class="body" x="120" y="92"  font-size="14">A section number lives in the gutter,</text>
  <text class="body" x="120" y="112" font-size="14">not in the running text. The eye picks</text>
  <text class="body" x="120" y="132" font-size="14">it up the way a reader scans a printed</text>
  <text class="body" x="120" y="152" font-size="14">book — without breaking the line.</text>
  <text class="mark" x="78"  y="186" font-size="11" text-anchor="end">1.1</text>
  <text class="body" x="120" y="188" font-size="15" font-weight="500">A subsection follows the same rule</text>
</svg>
